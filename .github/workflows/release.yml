name: Release

# Publishes @ckalima/pipedrive-mcp-server to npm with build provenance and
# creates a GitHub Release. Triggered by pushing a v*.*.* tag (admin-only via
# the "Protect release tags (v*)" ruleset). workflow_dispatch runs a publish-
# skipping dry-run that still validates the build and the staged tarball.
#
# Auth (bootstrap path): npm cannot pre-register a trusted publisher for a
# never-published package, so the first 2.0.0 publish authenticates with a
# granular NPM_TOKEN. Provenance is generated from the Actions OIDC id-token
# (id-token: write below), independent of publish auth, so 2.0.0 ships signed.
# After the package exists: register the npm trusted publisher (user ckalima,
# repo pipedrive-mcp-server, workflow release.yml), drop NODE_AUTH_TOKEN, and
# revoke the NPM_TOKEN.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch: {}

# Restrictive workflow-wide default; the publish job opts up to exactly what it needs.
permissions: {}

jobs:
  publish:
    name: Publish to npm (provenance)
    runs-on: ubuntu-latest
    # Only run on a tag push, or a workflow_dispatch from the trusted main branch.
    # The id-token:write/contents:write below are job-level, so they are live during
    # the un-gated npm ci / npm run build steps; this gate stops a workflow_dispatch
    # against an arbitrary (attacker-controlled) branch from executing build code while
    # an OIDC id-token is mintable. Dispatch is a main-branch dry-run only.
    if: github.event_name == 'push' || github.ref == 'refs/heads/main'
    # Least privilege, scoped to this job only so a future job in this workflow
    # cannot inherit token-minting (id-token) or release-writing (contents) rights.
    permissions:
      contents: write # create the GitHub Release
      id-token: write # OIDC token for npm build provenance
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify tag matches package.json version
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          PKG=$(jq -r .version package.json)
          TAG=${GITHUB_REF_NAME#v}
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::tag $TAG does not match package.json version $PKG"
            exit 1
          fi
          echo "tag and package.json agree on $PKG"

      - name: Verify tarball contains built server code
        # Runs on dispatch too, so a dry-run catches an empty/dist-less tarball.
        run: |
          test -f dist/index.js
          PACK=$(npm pack --dry-run --json)
          FILES=$(echo "$PACK" | jq '.[0].files | length')
          echo "$PACK" | jq -e '.[0].files[] | select(.path == "dist/index.js")' >/dev/null \
            || { echo "::error::tarball is missing dist/index.js (dist not built?)"; exit 1; }
          echo "tarball file count: $FILES"
          # Sanity floor: a real tarball is many files, not the 3-file empty case
          # (LICENSE, README, package.json) you get when dist/ was never built.
          [ "$FILES" -gt 3 ] || { echo "::error::tarball has only $FILES files — dist appears empty"; exit 1; }

      - name: Publish to npm with provenance
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_LOGLEVEL: warn
        run: |
          VER=${GITHUB_REF_NAME#v}
          if npm publish --provenance --access public; then
            echo "published @ckalima/pipedrive-mcp-server@$VER"
          elif npm view "@ckalima/pipedrive-mcp-server@$VER" version >/dev/null 2>&1; then
            # Re-run of an already-published immutable version: the artifact exists,
            # so this is not a failure — fall through to the provenance assertion
            # and (re-)create the GitHub Release rather than 403-ing the whole job.
            echo "::notice::version $VER already published; continuing to verification"
          else
            echo "::error::npm publish failed and $VER is not on the registry"
            exit 1
          fi

      - name: Assert publish carries provenance
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          VER=${GITHUB_REF_NAME#v}
          for i in 1 2 3 4 5; do
            # Capture npm view separately: a not-yet-propagated version exits 1
            # (E404), which under `bash -eo pipefail` would otherwise abort this
            # whole step on attempt 1 and defeat the retry loop it lives in.
            RAW=$(npm view "@ckalima/pipedrive-mcp-server@$VER" --json 2>/dev/null || true)
            ATT=$(printf '%s' "$RAW" | jq -r '.dist.attestations.url // empty' 2>/dev/null || true)
            if [ -n "$ATT" ]; then
              echo "provenance attestation present: $ATT"
              exit 0
            fi
            echo "attempt $i: attestation not visible yet, retrying in 10s..."
            sleep 10
          done
          echo "::error::published $VER has no provenance/attestation metadata (unsigned publish)"
          exit 1

      - name: Extract release notes from CHANGELOG
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          VER=${GITHUB_REF_NAME#v}
          awk -v ver="$VER" '
            index($0, "## [" ver "]") == 1 { flag=1; print; next }
            /^## \[/ && flag { flag=0 }
            /^\[[0-9]/ && flag { flag=0 }
            flag { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Release $VER" > RELEASE_NOTES.md
          fi
          echo "----- release notes -----"
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        id: release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        # Non-blocking: the npm publish above is the irreversible success
        # criterion. A release-notes hiccup must not fail an already-published,
        # immutable version — the release can be created/retried manually.
        continue-on-error: true
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          # TODO(#85): attach .mcpb once gen-docs produces a fresh in-sync bundle in CI.

      - name: Warn if the GitHub Release was not created
        # The npm publish above already succeeded (immutable). A release-notes or
        # API hiccup must not red the run, but a silently-missing release should be
        # visible so it can be created by hand.
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && steps.release.outcome == 'failure'
        run: echo "::warning::GitHub Release for $GITHUB_REF_NAME was not created (npm publish succeeded). Create it manually from CHANGELOG.md."
