name: Release

# Publishes @ckalima/pipedrive-mcp-server to npm with build provenance and
# creates a GitHub Release. Triggered by pushing a v*.*.* tag (admin-only via
# the "Protect release tags (v*)" ruleset). workflow_dispatch runs a publish-
# skipping dry-run that still validates the build and the staged tarball.
#
# Auth: OIDC trusted publishing. The npm package is configured with a trusted
# publisher (user ckalima, repo pipedrive-mcp-server, workflow release.yml) and
# publishing access set to "disallow tokens", so npm authenticates this workflow
# via the Actions OIDC id-token (id-token: write below) with no long-lived
# secret. Trusted publishing requires npm >= 11.5.1, which is installed below
# because the Node 22 runtime ships an older npm. Provenance attestations are
# produced automatically under trusted publishing.
#
# History: 2.0.0 was bootstrap-published with a granular NPM_TOKEN because npm
# cannot pre-register a trusted publisher for a never-published package; that
# token was retired once the package existed.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch: {}

# Restrictive workflow-wide default; the publish job opts up to exactly what it needs.
permissions: {}

jobs:
  publish:
    name: Publish to npm (provenance)
    runs-on: ubuntu-latest
    # Only run on a tag push, or a workflow_dispatch from the trusted main branch.
    # The id-token:write/contents:write below are job-level, so they are live during
    # the un-gated npm ci / npm run build steps; this gate stops a workflow_dispatch
    # against an arbitrary (attacker-controlled) branch from executing build code while
    # an OIDC id-token is mintable. Dispatch is a main-branch dry-run only.
    if: github.event_name == 'push' || github.ref == 'refs/heads/main'
    # Least privilege, scoped to this job only so a future job in this workflow
    # cannot inherit token-minting (id-token) or release-writing (contents) rights.
    permissions:
      contents: write # create the GitHub Release
      id-token: write # OIDC token: authenticates trusted publishing + signs provenance
    # Surfaced to the registry job so it can verify byte-identity of the .mcpb it publishes
    # against the asset this job attached to the Release.
    outputs:
      mcpb_file: ${{ steps.mcpb.outputs.file }}
      mcpb_sha256: ${{ steps.mcpb.outputs.sha256 }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Upgrade npm for OIDC trusted publishing (requires >= 11.5.1)
        # Node 22 ships npm 10.x, which predates OIDC trusted publishing. The
        # tokenless publish below fails without this. Pin to the v11 major
        # (well above the 11.5.1 floor) rather than @latest so a future npm
        # major can't silently change publish behavior on a tag push.
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify tag matches package.json version
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          PKG=$(jq -r .version package.json)
          TAG=${GITHUB_REF_NAME#v}
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::tag $TAG does not match package.json version $PKG"
            exit 1
          fi
          echo "tag and package.json agree on $PKG"

      - name: Verify tarball contains built server code
        # Runs on dispatch too, so a dry-run catches an empty/dist-less tarball.
        run: |
          test -f dist/index.js
          PACK=$(npm pack --dry-run --json)
          FILES=$(echo "$PACK" | jq '.[0].files | length')
          echo "$PACK" | jq -e '.[0].files[] | select(.path == "dist/index.js")' >/dev/null \
            || { echo "::error::tarball is missing dist/index.js (dist not built?)"; exit 1; }
          echo "tarball file count: $FILES"
          # Sanity floor: a real tarball is many files, not the 3-file empty case
          # (LICENSE, README, package.json) you get when dist/ was never built.
          [ "$FILES" -gt 3 ] || { echo "::error::tarball has only $FILES files — dist appears empty"; exit 1; }

      - name: Build .mcpb desktop bundle
        # Built BEFORE the irreversible npm publish so a pack failure stops the release here
        # rather than after a version is already on npm. Runs on dispatch too, so a dry-run
        # also exercises the bundle build.
        run: npm run bundle:mcpb

      - name: Compute .mcpb SHA-256 and stage assets
        id: mcpb
        run: |
          VER=$(jq -r .version package.json)
          FILE="pipedrive-mcp-server-${VER}.mcpb"
          test -f "$FILE" || { echo "::error::$FILE not found after bundle:mcpb"; exit 1; }
          SHA=$(sha256sum "$FILE" | awk '{print $1}')
          printf '%s  %s\n' "$SHA" "$FILE" > "${FILE}.sha256"
          {
            echo "file=$FILE"
            echo "sha256=$SHA"
          } >> "$GITHUB_OUTPUT"
          {
            echo "### MCPB bundle"
            echo "- \`$FILE\`"
            echo "- sha256: \`$SHA\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload .mcpb for the registry job
        # Passes the EXACT bytes (not a rebuild) to the registry job so the published
        # fileSha256 is guaranteed to match the asset attached to the Release.
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mcpb-bundle
          path: |
            pipedrive-mcp-server-*.mcpb
            pipedrive-mcp-server-*.mcpb.sha256
          if-no-files-found: error
          retention-days: 7

      - name: Publish to npm with provenance
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        # No NODE_AUTH_TOKEN: auth is OIDC trusted publishing via id-token: write.
        env:
          NPM_CONFIG_LOGLEVEL: warn
        run: |
          VER=${GITHUB_REF_NAME#v}
          if npm publish --provenance --access public; then
            echo "published @ckalima/pipedrive-mcp-server@$VER"
          elif npm view "@ckalima/pipedrive-mcp-server@$VER" version >/dev/null 2>&1; then
            # Re-run of an already-published immutable version: the artifact exists,
            # so this is not a failure — fall through to the provenance assertion
            # and (re-)create the GitHub Release rather than 403-ing the whole job.
            echo "::notice::version $VER already published; continuing to verification"
          else
            echo "::error::npm publish failed and $VER is not on the registry"
            exit 1
          fi

      - name: Assert publish carries provenance
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          VER=${GITHUB_REF_NAME#v}
          for i in 1 2 3 4 5; do
            # Capture npm view separately: a not-yet-propagated version exits 1
            # (E404), which under `bash -eo pipefail` would otherwise abort this
            # whole step on attempt 1 and defeat the retry loop it lives in.
            RAW=$(npm view "@ckalima/pipedrive-mcp-server@$VER" --json 2>/dev/null || true)
            ATT=$(printf '%s' "$RAW" | jq -r '.dist.attestations.url // empty' 2>/dev/null || true)
            if [ -n "$ATT" ]; then
              echo "provenance attestation present: $ATT"
              exit 0
            fi
            echo "attempt $i: attestation not visible yet, retrying in 10s..."
            sleep 10
          done
          echo "::error::published $VER has no provenance/attestation metadata (unsigned publish)"
          exit 1

      - name: Extract release notes from CHANGELOG
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          VER=${GITHUB_REF_NAME#v}
          awk -v ver="$VER" '
            index($0, "## [" ver "]") == 1 { flag=1; print; next }
            /^## \[/ && flag { flag=0 }
            /^\[[0-9]/ && flag { flag=0 }
            flag { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Release $VER" > RELEASE_NOTES.md
          fi
          echo "----- release notes -----"
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        id: release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        # Non-blocking: the npm publish above is the irreversible success
        # criterion. A release-notes hiccup must not fail an already-published,
        # immutable version — the release can be created/retried manually.
        continue-on-error: true
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: |
            ${{ steps.mcpb.outputs.file }}
            ${{ steps.mcpb.outputs.file }}.sha256

      - name: Warn if the GitHub Release was not created
        # The npm publish above already succeeded (immutable). A release-notes or
        # API hiccup must not red the run, but a silently-missing release should be
        # visible so it can be created by hand.
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && steps.release.outcome == 'failure'
        run: echo "::warning::GitHub Release for $GITHUB_REF_NAME was not created (npm publish succeeded). Create it manually from CHANGELOG.md."

  registry:
    name: Publish to MCP registry
    # Runs only after a real tag-push publish job succeeds. Splitting this out of the
    # publish job keeps the irreversible npm step lean: a registry hiccup never touches the
    # already-published npm artifact, and a missed entry can be back-published later from the
    # durable Release asset (npm run registry:publish). The registry version is immutable, so
    # the fileSha256 we publish must match the attached .mcpb byte-for-byte (asserted below).
    needs: publish
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      id-token: write # OIDC auth to the MCP registry (github-oidc); maps to io.github.ckalima/*
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download the .mcpb built by the publish job
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: mcpb-bundle

      - name: Verify bundle byte-identity
        # The hash we publish to the registry MUST match the asset clients download. Re-hash
        # the downloaded artifact and assert it equals the publish job's computed hash.
        env:
          FILE: ${{ needs.publish.outputs.mcpb_file }}
          EXPECT: ${{ needs.publish.outputs.mcpb_sha256 }}
        run: |
          test -f "$FILE" || { echo "::error::artifact $FILE missing"; exit 1; }
          GOT=$(sha256sum "$FILE" | awk '{print $1}')
          if [ "$GOT" != "$EXPECT" ]; then
            echo "::error::sha256 drift: artifact $GOT != publish-job $EXPECT"; exit 1
          fi
          echo "bundle sha256 verified: $GOT"

      - name: Inject release URL + hash into server.json
        # Publish-boundary backstop: assert the hash actually written into server.json (what
        # gets published) equals the publish job's hash. The registry never validates fileSha256
        # and a wrong value silently breaks client installs on an immutable version, so this is
        # worth a redundant check even though the byte-identity step already verified the artifact.
        env:
          EXPECT: ${{ needs.publish.outputs.mcpb_sha256 }}
        run: |
          npm run registry:inject -- "${{ needs.publish.outputs.mcpb_file }}"
          GOT=$(jq -r '.packages[] | select(.registryType=="mcpb") | .fileSha256' server.json)
          if [ "$GOT" != "$EXPECT" ]; then
            echo "::error::server.json mcpb fileSha256 $GOT != attached bundle $EXPECT"; exit 1
          fi
          echo "server.json mcpb hash matches the attached bundle: $EXPECT"

      - name: Install mcp-publisher
        # Pinned to a known version (not releases/latest) so a future mcp-publisher release
        # can't silently change publish behavior in this OIDC-privileged job, matching how the
        # publish job pins npm@11. Bump deliberately. No --version `|| true`: a bad download
        # must fail here, not surface later as a confusing login error.
        env:
          MCP_PUBLISHER_VERSION: v1.7.9
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
          ./mcp-publisher --version

      - name: Authenticate to the MCP registry (OIDC)
        # Retry transient OIDC/registry blips. This call exercises the OIDC -> io.github.ckalima
        # namespace mapping live, and the first real release is the riskiest run. `until` does not
        # trip `set -e`; a persistent failure still reds the job (fallback: npm run registry:publish).
        run: |
          n=0
          until ./mcp-publisher login github-oidc; do
            n=$((n + 1))
            if [ "$n" -ge 3 ]; then
              echo "::error::OIDC login to the MCP registry failed after $n attempts"; exit 1
            fi
            echo "login attempt $n failed; retrying in 5s..."
            sleep 5
          done

      - name: Publish to the MCP registry (idempotent) and verify hash
        # Publishing the whole server.json publishes both the npm and mcpb packages. Re-runs on
        # an already-published immutable version are tolerated: the read-back below confirms the
        # injected hash is live regardless of the publish exit code.
        env:
          REG: https://registry.modelcontextprotocol.io/v0.1/servers?search=io.github.ckalima/pipedrive-mcp-server
          EXPECT: ${{ needs.publish.outputs.mcpb_sha256 }}
        run: |
          VER=${GITHUB_REF_NAME#v}
          ./mcp-publisher validate server.json
          set +e
          ./mcp-publisher publish
          PUB=$?
          set -e
          if [ "$PUB" -eq 0 ]; then
            echo "mcp-publisher publish succeeded for $VER"
          else
            echo "::warning::mcp-publisher publish exited $PUB; verifying whether $VER is already live with this hash"
          fi
          # The registry does not validate fileSha256, so confirm it ourselves. Scope the check
          # to THIS version's mcpb package via jq (not a body-wide grep): the search endpoint
          # returns every published version, so a bare substring match could "verify" a hash that
          # belongs to a different version, or miss ours if the response paginates.
          for i in 1 2 3 4 5 6; do
            BODY=$(curl -fsSL "$REG" 2>/dev/null || true)
            GOT=$(printf '%s' "$BODY" | jq -r --arg v "$VER" \
              '.servers[]? | select(.server.version==$v) | .server.packages[]?
               | select(.registryType=="mcpb") | .fileSha256 // empty' 2>/dev/null | head -n1)
            if [ "$GOT" = "$EXPECT" ]; then
              echo "verified: $VER mcpb fileSha256 $EXPECT is live in the registry"
              exit 0
            fi
            echo "attempt $i: $VER not yet live with the expected hash (got '${GOT:-<none>}'), retrying in 10s..."
            sleep 10
          done
          if [ "$PUB" -ne 0 ]; then
            echo "::error::publish failed and $VER is not live with $EXPECT — a different hash may already occupy $VER (immutable; cut a new version)"
            exit 1
          fi
          echo "::warning::publish reported success but read-back did not confirm the hash within timeout (registry lag?). Verify manually: $REG"
