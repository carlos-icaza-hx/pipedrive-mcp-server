name: Secret Scan

# gitleaks runs in two modes depending on the trigger:
#   - pull_request / push: the action scans only the commits in the event (the diff).
#     This is the blocking gate that stops a NEW secret from landing.
#   - schedule / workflow_dispatch: the action scans the ENTIRE git history, giving a
#     mechanical full-history baseline (catches anything that slipped in out-of-band,
#     e.g. a force-push) without relying on a one-off manual sweep.
# A complete clone (fetch-depth: 0) is required so the history-range lookups resolve.
#
# This workflow's job is named `secret-scan`, which becomes a new status check. Add it
# to the main branch-protection required checks once it has run at least once.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full-history sweep, Mondays 06:00 UTC.
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
